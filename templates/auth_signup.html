<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="auth-page-shell">
    <section class="auth-card">
      <p class="eyebrow mb-2">Create Account</p>
      <h1 class="panel-title">Sign Up</h1>
      <p class="panel-text">This scaffolds role-based access for the next roadmap stages.</p>
      {% if error %}
      <div class="status-banner is-error">{{ error }}</div>
      {% endif %}
      <form method="post" class="control-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="field-block">
          <label class="form-label" for="full_name">Full Name</label>
          <input id="full_name" name="full_name" type="text" class="form-control" required>
        </div>
        <div class="field-block">
          <label class="form-label" for="email">Email</label>
          <input id="email" name="email" type="email" class="form-control" required>
        </div>
        <div class="field-block">
          <label class="form-label" for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" minlength="8" required>
        </div>
        <div class="dataset-banner is-live">
          <p class="dataset-title mb-1">Default role: Citizen</p>
          <p class="dataset-text mb-0">Privileged roles should be assigned later by an administrator.</p>
        </div>
        <div class="action-row">
          <button class="btn btn-signal" type="submit">Create Account</button>
          <a class="btn btn-ghost" href="{{ url_for('auth.login') }}">Login</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
