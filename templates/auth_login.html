<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="auth-page-shell">
    <section class="auth-card">
      <p class="eyebrow mb-2">Account Access</p>
      <h1 class="panel-title">Login</h1>
      <p class="panel-text">Use your account to access protected parts of the system.</p>
      {% if error %}
      <div class="status-banner is-error">{{ error }}</div>
      {% endif %}
      <form method="post" class="control-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="field-block">
          <label class="form-label" for="email">Email</label>
          <input id="email" name="email" type="email" class="form-control" required>
        </div>
        <div class="field-block">
          <label class="form-label" for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" required>
        </div>
        <div class="action-row">
          <button class="btn btn-signal" type="submit">Login</button>
          <a class="btn btn-ghost" href="{{ url_for('auth.signup') }}">Create Account</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
