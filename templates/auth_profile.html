<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="auth-page-shell">
    <section class="auth-card">
      <p class="eyebrow mb-2">Profile</p>
      <h1 class="panel-title">{{ user.full_name }}</h1>
      <div class="profile-grid">
        <div class="summary-card">
          <span class="summary-label">Email</span>
          <strong class="summary-value profile-value">{{ user.email }}</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Role</span>
          <strong class="summary-value profile-value">{{ user.role|replace('_', ' ')|title }}</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Active</span>
          <strong class="summary-value profile-value">{{ "Yes" if user.is_active else "No" }}</strong>
        </div>
      </div>
      <div class="action-row">
        <a class="btn btn-ghost" href="{{ url_for('web.home') }}">Back Home</a>
        <form method="post" action="{{ url_for('auth.logout') }}">
          <button class="btn btn-signal" type="submit">Logout</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
