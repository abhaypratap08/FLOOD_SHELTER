<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Update Shelter Status</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="auth-page-shell manage-page-wide">
    <section class="auth-card">
      <div class="section-head">
        <div>
          <p class="eyebrow mb-1">Status Update</p>
          <h1 class="panel-title">{{ shelter.name }}</h1>
          <p class="panel-text mb-0">Record operational availability, supplies, and road conditions.</p>
        </div>
        <div class="auth-actions">
          <a class="btn btn-ghost" href="{{ url_for('management_web.edit_shelter', shelter_id=shelter.id) }}">Edit Shelter</a>
          <a class="btn btn-ghost" href="{{ url_for('management_web.shelters') }}">Back</a>
        </div>
      </div>
      {% if error %}
      <div class="status-banner is-error">{{ error }}</div>
      {% endif %}
      {% if latest_status %}
      <div class="dataset-banner is-live">
        <p class="dataset-title mb-1">Latest update</p>
        <p class="dataset-text mb-0">{{ latest_status.shelter_status|title }} at {{ latest_status.recorded_at }}</p>
      </div>
      {% endif %}
      <form method="post" class="control-form">
        <div class="field-grid">
          <div class="field-block">
            <label class="form-label" for="available_beds">Available beds</label>
            <input id="available_beds" name="available_beds" type="number" min="0" class="form-control" value="{{ form_data.available_beds or '' }}">
          </div>
          <div class="field-block">
            <label class="form-label" for="shelter_status">Shelter status</label>
            <select id="shelter_status" name="shelter_status" class="form-select">
              {% for value in ['operational', 'limited', 'full', 'closed'] %}
              <option value="{{ value }}" {% if form_data.shelter_status == value %}selected{% endif %}>{{ value|title }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="field-grid">
          <div class="field-block">
            <label class="form-label" for="medical_support_level">Medical support</label>
            <select id="medical_support_level" name="medical_support_level" class="form-select">
              {% for value in ['none', 'basic', 'advanced'] %}
              <option value="{{ value }}" {% if form_data.medical_support_level == value %}selected{% endif %}>{{ value|title }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="field-block">
            <label class="form-label" for="food_water_status">Food/water</label>
            <select id="food_water_status" name="food_water_status" class="form-select">
              {% for value in ['critical', 'low', 'stable', 'good'] %}
              <option value="{{ value }}" {% if form_data.food_water_status == value %}selected{% endif %}>{{ value|title }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="field-block">
          <label class="form-label" for="road_access_status">Road access</label>
          <select id="road_access_status" name="road_access_status" class="form-select">
            {% for value in ['blocked', 'limited', 'open'] %}
            <option value="{{ value }}" {% if form_data.road_access_status == value %}selected{% endif %}>{{ value|title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field-block">
          <label class="form-label" for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="4" class="form-control">{{ form_data.notes or '' }}</textarea>
        </div>
        <div class="action-row">
          <button class="btn btn-signal" type="submit">Record Update</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
